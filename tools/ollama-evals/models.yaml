# ollama-evals configuration (COMMITTED example — safe defaults, no personal hosts).
#
# To point at an Ollama on your LAN (e.g. a Mac mini), DO NOT edit this file with your
# host. Instead either:
#   1. export OLLAMA_BASE_URL=http://<your-host>:11434/v1     (env var wins), or
#   2. copy this file to models.local.yaml (gitignored) and set base_url there.

# OpenAI-compatible Ollama endpoint. Env var OLLAMA_BASE_URL overrides this.
base_url: http://127.0.0.1:11434/v1

# Deterministic sampling for reproducible evals.
defaults:
  temperature: 0.0
  seed: 7
  num_ctx: 8192

# Models under test — the set you compare against each other / across versions.
models:
  - qwen2.5-coder:7b
  - llama3.1:8b

# LLM-as-judge configuration. Local by default (fully offline). Set provider: remote
# + a model id to use a hosted judge; the API key is read from the environment, never
# committed.
judge:
  provider: local          # local | remote
  model: qwen2.5:14b       # a stronger local model than those under test
  # remote_model: claude-opus-4-8   # used only when provider: remote
  # remote_api_key_env: ANTHROPIC_API_KEY
